version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: prompt_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Hosted on 5433 to avoid local conflict

  redis:
    image: redis:7-alpine
    container_name: prompt_redis
    ports:
      - "6380:6379" # Hosted on 6380 to avoid local conflict

  backend:
    build: ./backend
    container_name: prompt_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=True
      - SECRET_KEY=django-insecure-prod-key
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: prompt_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
